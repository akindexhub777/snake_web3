<!DOCTYPE html>
<html>
<head>
  <title>Snake Web3 🐍</title>
  <style>
    body { text-align: center; background: black; color: white; }
    canvas { background: #111; margin-top: 20px; }
    button { padding: 10px; margin: 10px; }
  </style>
</head>
<body>

<h1>🐍 Snake Web3</h1>

<button onclick="startGame()">Start Game</button>

<p>Score: <span id="score">0</span></p>

<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let snake, food, dx, dy, score, gameOver

function init() {
  snake = [{x:10,y:10}]
  food = {x:5,y:5}
  dx = 1
  dy = 0
  score = 0
  gameOver = false
  document.getElementById("score").innerText = score
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp" && dy === 0) { dx=0; dy=-1 }
  if (e.key === "ArrowDown" && dy === 0) { dx=0; dy=1 }
  if (e.key === "ArrowLeft" && dx === 0) { dx=-1; dy=0 }
  if (e.key === "ArrowRight" && dx === 0) { dx=1; dy=0 }
})

function gameLoop() {
  if (gameOver) return

  let head = {x: snake[0].x + dx, y: snake[0].y + dy}

  // 💀 collision mur
  if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20) {
    endGame()
    return
  }

  // 💀 collision avec soi-même
  for (let s of snake) {
    if (s.x === head.x && s.y === head.y) {
      endGame()
      return
    }
  }

  snake.unshift(head)

  // 🍎 manger
  if (head.x === food.x && head.y === food.y) {
    score++
    document.getElementById("score").innerText = score
    eatFood()

    food = {
      x: Math.floor(Math.random()*20),
      y: Math.floor(Math.random()*20)
    }
  } else {
    snake.pop()
  }

  draw()
}

function draw() {
  ctx.fillStyle = "black"
  ctx.fillRect(0,0,400,400)

  ctx.fillStyle = "lime"
  snake.forEach(s => ctx.fillRect(s.x*20, s.y*20, 18, 18))

  ctx.fillStyle = "red"
  ctx.fillRect(food.x*20, food.y*20, 18, 18)
}

function endGame() {
  gameOver = true
  alert("💀 Game Over! Score: " + score)
}

// 🚀 Web3 simulation (sans spam popup)
function startGame() {
  init()
  console.log("Game started (blockchain)")
}

function eatFood() {
  console.log("Score saved on blockchain:", score)
}

init()
setInterval(gameLoop, 120)
</script>

</body>
</html>
