<!DOCTYPE html>
<html>
<head>
  <title>Snake Web3 AI 🐍</title>
  <script type="importmap">
  {
    "imports": {
      "genlayer-js": "https://esm.sh/genlayer-js@latest",
      "genlayer-js/chains": "https://esm.sh/genlayer-js@latest/chains"
    }
  }
  </script>
  <style>
    body { text-align: center; background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
    canvas { background: #111; border: 4px solid #0f0; box-shadow: 0 0 20px #0f0; }
   .ui { margin: 20px; padding: 15px; border: 1px solid #333; display: inline-block; border-radius: 10px; }
    button { background: #0f0; color: #000; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; border-radius: 5px; margin: 5px; transition: 0.3s; }
    button:hover { background: #fff; transform: scale(1.05); }
    #status { color: #ff0; font-weight: bold; }
  </style>
</head>
<body>
  <h1>🐍 SNAKE WEB3 PRO (GenLayer)</h1>
  
  <div class="ui">
    <button id="connectBtn">1. CONNECTER WALLET</button>
    <button id="saveBtn">2. SAUVEGARDER SCORE</button>
    <p>Score : <span id="score">0</span> | Statut : <span id="status">En attente...</span></p>
  </div>

  <br>
  <canvas id="game" width="400" height="400"></canvas>
  <p><i>Utilise les flèches du clavier pour diriger le serpent!</i></p>

  <script type="module">
    import { createClient } from 'genlayer-js';
    import { studionet } from 'genlayer-js/chains';

    // ⚠️ METS ICI L'ADRESSE DE TON CONTRAT DÉPLOYÉ DANS LE STUDIO
    const CONTRACT_ADDR = "0xcC1cBD16085a10Cd7c45DC9b770b4698a2297487"; 
    const client = createClient({ chain: studionet, endpoint: "https://studio.genlayer.com/api/rpc" });

    let account = null;
    let score = 0;
    let gameActive = false;

    // --- Connexion Wallet ---
    document.getElementById('connectBtn').onclick = async () => {
      if (typeof window.ethereum!== 'undefined') {
        const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
        account = accounts;
        document.getElementById('status').innerText = "Connecté : " + account.substring(0,6) + "...";
        document.getElementById('status').style.color = "#0f0";
      } else {
        alert("Installe MetaMask!");
      }
    };

    // --- Sauvegarde Blockchain ---
    document.getElementById('saveBtn').onclick = async () => {
      if (!account) return alert("Connecte ton wallet d'abord!");
      document.getElementById('status').innerText = "⏳ Envoi à l'IA GenLayer...";
      try {
        const tx = await client.writeContract({
          address: CONTRACT_ADDR, 
          functionName: "submit_score", 
          args:, 
          account: account
        });
        await client.waitForTransactionReceipt({ hash: tx });
        document.getElementById('status').innerText = "✅ Score validé on-chain!";
      } catch (e) {
        document.getElementById('status').innerText = "❌ Erreur de transaction";
        console.error(e);
      }
    };

    // --- Logique du Jeu (Fixée) ---
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const gridSize = 20;
    const tileCount = 20;

    let snake = [{x: 10, y: 10}];
    let food = {x: 5, y: 5};
    let dx = 0;
    let dy = 0;

    document.addEventListener("keydown", (e) => {
      if (!gameActive) gameActive = true;
      if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -1; }
      if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = 1; }
      if (e.key === "ArrowLeft" && dx === 0) { dx = -1; dy = 0; }
      if (e.key === "ArrowRight" && dx === 0) { dx = 1; dy = 0; }
    });

    function drawGame() {
      // Calcul du mouvement
      const head = { x: snake.x + dx, y: snake.y + dy };
      
      if (gameActive) {
        // Collision murs
        if (head.x < 0 |

| head.x >= tileCount |
| head.y < 0 |
| head.y >= tileCount) {
          resetGame();
          return;
        }
        // Collision corps
        if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
          resetGame();
          return;
        }

        snake.unshift(head);

        // Manger la nourriture
        if (head.x === food.x && head.y === food.y) {
          score++;
          document.getElementById('score').innerText = score;
          food = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
        } else {
          snake.pop();
        }
      }

      // Dessiner le fond
      ctx.fillStyle = "#111";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Dessiner le serpent
      ctx.fillStyle = "#0f0";
      snake.forEach(s => ctx.fillRect(s.x * gridSize, s.y * gridSize, gridSize - 2, gridSize - 2));

      // Dessiner la nourriture
      ctx.fillStyle = "#f00";
      ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
      
      setTimeout(drawGame, 150);
    }

    function resetGame() {
      alert("Game Over! Score : " + score);
      snake = [{x: 10, y: 10}];
      dx = 0; dy = 0;
      score = 0;
      gameActive = false;
      document.getElementById('score').innerText = score;
    }

    drawGame();
  </script>
</body>
</html>
