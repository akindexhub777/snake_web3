<!DOCTYPE html>
<html>
<head>
  <title>Snake Web3 🐍</title>
  <style>
    body { text-align: center; background: black; color: white; font-family: Arial; }
    canvas { background: #111; margin-top: 20px; }
    button { padding: 10px; margin: 10px; cursor: pointer; }
  </style>
</head>
<body>

<h1>🐍 Snake Web3</h1>

<button onclick="connectWallet()">🔗 Connect Wallet</button>
<p id="wallet">Not connected</p>

<button onclick="startGame()">▶️ Start Game</button>

<p>Score: <span id="score">0</span></p>

<h2>🏆 Leaderboard</h2>
<button onclick="loadLeaderboard()">Load Leaderboard</button>
<ul id="leaderboard"></ul>

<h2>💰 Reward</h2>
<button onclick="claimReward()">Claim Reward</button>
<p id="reward">0</p>

<canvas id="game" width="400" height="400"></canvas>

<script>
const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let snake, food, dx, dy, score, gameOver
let walletAddress = null

// 🔗 CONNECT WALLET
async function connectWallet() {
  if (window.ethereum) {
    const accounts = await window.ethereum.request({
      method: 'eth_requestAccounts'
    })
    walletAddress = accounts[0]
    document.getElementById("wallet").innerText =
      "Connected: " + walletAddress
  } else {
    alert("Install MetaMask or Rabby Wallet")
  }
}

// 🎮 INIT
function init() {
  snake = [{x:10,y:10}]
  food = {x:5,y:5}
  dx = 1
  dy = 0
  score = 0
  gameOver = false
  document.getElementById("score").innerText = score
}

// ▶️ START
function startGame() {
  if (!walletAddress) {
    alert("Connect wallet first 🔗")
    return
  }
  init()
}

// 🎮 CONTROLS
document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp" && dy === 0) { dx=0; dy=-1 }
  if (e.key === "ArrowDown" && dy === 0) { dx=0; dy=1 }
  if (e.key === "ArrowLeft" && dx === 0) { dx=-1; dy=0 }
  if (e.key === "ArrowRight" && dx === 0) { dx=1; dy=0 }
})

// 🎮 GAME LOOP
function gameLoop() {
  if (gameOver) return

  let head = {x: snake[0].x + dx, y: snake[0].y + dy}

  if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20) {
    endGame()
    return
  }

  for (let s of snake) {
    if (s.x === head.x && s.y === head.y) {
      endGame()
      return
    }
  }

  snake.unshift(head)

  if (head.x === food.x && head.y === food.y) {
    score++
    document.getElementById("score").innerText = score

    sendScoreToBlockchain()

    food = {
      x: Math.floor(Math.random()*20),
      y: Math.floor(Math.random()*20)
    }
  } else {
    snake.pop()
  }

  draw()
}

// 🎨 DRAW
function draw() {
  ctx.fillStyle = "black"
  ctx.fillRect(0,0,400,400)

  ctx.fillStyle = "lime"
  snake.forEach(s => ctx.fillRect(s.x*20, s.y*20, 18, 18))

  ctx.fillStyle = "red"
  ctx.fillRect(food.x*20, food.y*20, 18, 18)
}

// 💀 GAME OVER
function endGame() {
  gameOver = true
  alert("💀 Game Over! Score: " + score)
}

// 🔗 WEB3 SIMULATION
function sendScoreToBlockchain() {
  console.log("Score saved on blockchain:", score)
}

// 🏆 LEADERBOARD
function loadLeaderboard() {
  const fakeData = [
    {player: "0xAAA...111", score: 10},
    {player: "0xBBB...222", score: 7},
    {player: "0xCCC...333", score: 5}
  ]

  const list = document.getElementById("leaderboard")
  list.innerHTML = ""

  fakeData.forEach(p => {
    const li = document.createElement("li")
    li.innerText = p.player + " → " + p.score
    list.appendChild(li)
  })
}

// 💰 REWARD
function claimReward() {
  if (!walletAddress) {
    alert("Connect wallet first")
    return
  }

  if (score < 5) {
    alert("Score too low! Reach 5 to claim reward")
    return
  }

  let reward = score * 10
  document.getElementById("reward").innerText = reward

  alert("🎉 Reward claimed: " + reward + " GEN (testnet)")
}

init()
setInterval(gameLoop, 120)
</script>

</body>
</html>
