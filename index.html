<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Web3 — GenLayer</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0f;color:#e0e0e0;font-family:Arial,sans-serif;display:flex;flex-direction:column;align-items:center;padding:16px;min-height:100vh}
    h1{color:#a78bfa;font-size:26px;margin-bottom:2px}
    .sub{color:#555;font-size:11px;margin-bottom:14px}

    .wallet-box{background:#111128;border:1px solid #2d2d4e;border-radius:10px;padding:10px 16px;margin-bottom:12px;width:100%;max-width:440px;text-align:center}
    #walletAddr{font-size:11px;color:#7c3aed;word-break:break-all;margin-top:4px;min-height:16px}
    #networkBadge{font-size:10px;margin-top:3px;min-height:14px}

    .stats{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;justify-content:center}
    .stat{background:#111128;border:1px solid #2d2d4e;border-radius:8px;padding:8px 14px;text-align:center;min-width:80px}
    .stat-label{font-size:10px;color:#666}
    .stat-val{font-size:18px;font-weight:bold}
    .sv-purple{color:#a78bfa}.sv-gold{color:#f59e0b}.sv-green{color:#10b981}.sv-blue{color:#38bdf8}

    canvas{border:2px solid #2d2d4e;border-radius:10px;display:block;background:#0d0d1a}

    .controls{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap;justify-content:center}
    button{padding:8px 16px;border-radius:8px;border:1px solid #2d2d4e;background:#111128;color:#e0e0e0;cursor:pointer;font-size:12px;transition:all .2s}
    button:hover{background:#1e1e3f;border-color:#7c3aed}
    button:disabled{opacity:.4;cursor:not-allowed}
    .btn-primary{background:#7c3aed;border-color:#7c3aed;color:#fff}
    .btn-primary:hover{background:#6d28d9}
    .btn-gold{background:#92400e;border-color:#f59e0b;color:#fde68a}
    .btn-gold:hover{background:#78350f}
    .btn-green{background:#065f46;border-color:#10b981;color:#6ee7b7}
    .btn-green:hover{background:#047857}

    #msg{font-size:12px;color:#f59e0b;min-height:18px;margin:4px 0;text-align:center;max-width:440px}
    #chainMsg{font-size:11px;color:#38bdf8;min-height:16px;text-align:center;margin-bottom:4px}

    .nft-badge{display:none;background:#064e3b;border:1px solid #10b981;border-radius:8px;padding:8px 16px;text-align:center;margin:6px 0;color:#10b981;font-weight:bold;font-size:13px}
    .nft-badge.show{display:block}

    .lb-card{background:#111128;border:1px solid #2d2d4e;border-radius:10px;padding:12px;width:100%;max-width:440px;margin-top:10px}
    .lb-card h3{font-size:11px;color:#7c3aed;text-transform:uppercase;margin-bottom:8px;letter-spacing:1px}
    .lb-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 6px;border-radius:5px;margin-bottom:3px}
    .lb-row:first-child{background:#2d1a4e}
    .lb-addr{color:#888;flex:1;margin:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .lb-score{font-weight:bold;color:#a78bfa}

    .dpad{display:none;flex-direction:column;align-items:center;gap:4px;margin-top:8px}
    .dpad-row{display:flex;gap:4px}
    .dpad button{width:48px;height:48px;font-size:18px;padding:0}
    @media(max-width:480px){.dpad{display:flex}}

    .tx-log{background:#0d0d1a;border:1px solid #1e1e3f;border-radius:8px;padding:8px;width:100%;max-width:440px;margin-top:8px;font-size:10px;color:#555;max-height:80px;overflow-y:auto;font-family:monospace}
  </style>
</head>
<body>

<h1>🐍 Snake Web3</h1>
<p class="sub">On-chain scoring · GenLayer Studionet · Hackathon 2026</p>

<!-- Wallet -->
<div class="wallet-box">
  <div id="walletAddr">Non connecté</div>
  <div id="networkBadge"></div>
  <button class="btn-primary" onclick="connectWallet()" style="margin-top:8px;width:100%">
    🔗 Connect Wallet (MetaMask / Rabby)
  </button>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat"><div class="stat-label">Score</div><div class="stat-val sv-purple" id="dispScore">0</div></div>
  <div class="stat"><div class="stat-label">High Score</div><div class="stat-val sv-purple" id="dispHigh">0</div></div>
  <div class="stat"><div class="stat-label">Tokens 🪙</div><div class="stat-val sv-gold" id="dispTokens">0</div></div>
  <div class="stat"><div class="stat-label">On-chain 🔗</div><div class="stat-val sv-blue" id="dispChain">—</div></div>
</div>

<!-- NFT Badge -->
<div class="nft-badge" id="nftBadge">🏆 NFT REWARD DÉBLOQUÉ — Score ≥ 10 !</div>

<!-- Boutons -->
<div class="controls">
  <button class="btn-primary" id="btnStart" onclick="startGame()">▶ Start</button>
  <button id="btnPause" onclick="pauseGame()">⏸ Pause</button>
  <button onclick="resetGame()">↺ Reset</button>
  <button class="btn-gold" onclick="claimReward()">💰 Claim Reward</button>
  <button class="btn-green" onclick="loadOnChainScore()">🔗 Sync Score</button>
</div>

<div id="msg">Connecte ton wallet puis appuie sur Start</div>
<div id="chainMsg"></div>

<!-- Canvas -->
<canvas id="game" width="400" height="400"></canvas>

<!-- D-pad mobile -->
<div class="dpad">
  <div class="dpad-row"><button onclick="setDir(0,-1)">↑</button></div>
  <div class="dpad-row">
    <button onclick="setDir(-1,0)">←</button>
    <button onclick="setDir(0,1)">↓</button>
    <button onclick="setDir(1,0)">→</button>
  </div>
</div>

<!-- Leaderboard -->
<div class="lb-card">
  <h3>🏆 Leaderboard (local)</h3>
  <div id="leaderboard"><div style="font-size:11px;color:#555;text-align:center">Joue pour apparaître ici</div></div>
</div>

<!-- TX Log -->
<div class="tx-log" id="txLog">[ Transaction log ]</div>

<!-- ═══════════════ ETHERS v5 CDN ═══════════════ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

<script>
// ══════════════════════════════════════════════
//  CONFIG — Contrat déployé sur GenLayer Studionet
// ══════════════════════════════════════════════
const CONTRACT_ADDR = "0x005158bfAf3708902E5eCd15BA79e835EDB82Bc5";
const CHAIN_ID      = 61999;   // GenLayer Studionet
const RPC_URL       = "https://rpc.studionet.genlayer.com";

// ABI minimal — fonctions utilisées
const ABI = [
  "function submit_score(uint256 final_score) external",
  "function claim_reward() external",
  "function reset_game() external",
  "function get_score(string player_str) view returns (uint256)",
  "function get_high_score(string player_str) view returns (uint256)",
  "function get_reward(string player_str) view returns (uint256)"
];

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
const GRID = 20, CELL = 400 / GRID;
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');

let snake, dir, food, score, highScore, tokens, nftUnlocked;
let gameLoop, running, paused;
let walletAddress = null;
let provider = null, signer = null, contract = null;
let leaderboard = JSON.parse(localStorage.getItem('snakeLB') || '[]');

// ══════════════════════════════════════════════
//  WALLET & CONTRACT
// ══════════════════════════════════════════════
async function connectWallet() {
  if (!window.ethereum) { setMsg('MetaMask / Rabby non détecté !'); return; }
  try {
    await window.ethereum.request({ method: 'eth_requestAccounts' });
    provider = new ethers.providers.Web3Provider(window.ethereum);
    signer   = provider.getSigner();
    walletAddress = await signer.getAddress();

    document.getElementById('walletAddr').textContent =
      walletAddress.slice(0,6) + '...' + walletAddress.slice(-4) + ' ✓';

    // Vérifier réseau
    const network = await provider.getNetwork();
    if (network.chainId !== CHAIN_ID) {
      document.getElementById('networkBadge').innerHTML =
        '<span style="color:#f87171">⚠ Mauvais réseau — ajoute GenLayer Studionet (ChainID 61999)</span>';
      setChainMsg('⚠ Ajoute GenLayer Studionet dans MetaMask pour enregistrer le score on-chain');
    } else {
      document.getElementById('networkBadge').innerHTML =
        '<span style="color:#10b981">✓ GenLayer Studionet</span>';
    }

    // Init contract
    contract = new ethers.Contract(CONTRACT_ADDR, ABI, signer);
    txLog('Wallet connecté: ' + walletAddress);
    setMsg('Wallet connecté ! Appuie sur Start.');

    // Charger score on-chain
    await loadOnChainScore();

  } catch(e) {
    setMsg('Connexion refusée.');
    console.error(e);
  }
}

async function loadOnChainScore() {
  if (!contract || !walletAddress) { setChainMsg('Connecte ton wallet pour voir le score on-chain'); return; }
  try {
    setChainMsg('🔄 Chargement score on-chain...');
    const s = await contract.get_score(walletAddress);
    const h = await contract.get_high_score(walletAddress);
    document.getElementById('dispChain').textContent = h.toString();
    setChainMsg('✅ High score on-chain : ' + h.toString());
    txLog('get_score on-chain: ' + s.toString());
  } catch(e) {
    setChainMsg('⚠ Impossible de lire le score on-chain');
    console.error(e);
  }
}

async function sendScoreOnChain(finalScore) {
  if (!contract) { txLog('Pas de contract — score non envoyé'); return; }
  if (finalScore <= 0) { txLog('Score 0 — pas envoyé'); return; }
  try {
    setChainMsg('📤 Envoi du score ' + finalScore + ' sur GenLayer...');
    txLog('submit_score(' + finalScore + ') envoyé...');
    const tx = await contract.submit_score(finalScore);
    txLog('TX hash: ' + tx.hash.slice(0,20) + '...');
    await tx.wait();
    setChainMsg('✅ Score ' + finalScore + ' enregistré on-chain !');
    txLog('✅ TX confirmée !');
    await loadOnChainScore();
  } catch(e) {
    setChainMsg('❌ Échec envoi score: ' + (e.message || '').slice(0,60));
    txLog('Erreur: ' + (e.message || '').slice(0,80));
    console.error(e);
  }
}

async function claimReward() {
  if (!walletAddress) { setMsg('Connecte ton wallet !'); return; }
  if (score < 5 && highScore < 5) { setMsg('Score trop bas ! Atteins 5 pour claim.'); return; }
  if (!contract) {
    // Fallback local
    const r = Math.max(score, highScore) * 10;
    setMsg('🎉 ' + r + ' GEN tokens claimés (simulation) !');
    return;
  }
  try {
    setChainMsg('📤 Claim reward on-chain...');
    const tx = await contract.claim_reward();
    await tx.wait();
    setChainMsg('✅ Reward claimé on-chain !');
    txLog('claim_reward confirmé');
  } catch(e) {
    setMsg('❌ Erreur claim: ' + (e.message || '').slice(0,50));
    console.error(e);
  }
}

// ══════════════════════════════════════════════
//  GAME ENGINE
// ══════════════════════════════════════════════
function initState() {
  snake  = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir    = {x:1,y:0};
  score  = 0;
  tokens = parseInt(localStorage.getItem('snakeTokens') || '0');
  highScore = parseInt(localStorage.getItem('snakeHigh') || '0');
  nftUnlocked = localStorage.getItem('snakeNFT') === '1';
  spawnFood();
  updateUI();
}

function spawnFood() {
  do { food = {x:Math.floor(Math.random()*GRID), y:Math.floor(Math.random()*GRID)}; }
  while (snake.some(s => s.x===food.x && s.y===food.y));
}

function startGame() {
  if (!walletAddress) { setMsg('Connecte ton wallet d\'abord !'); return; }
  if (running) return;
  initState();
  running = true; paused = false;
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, 130);
  document.getElementById('nftBadge').classList.remove('show');
  setMsg('');
}

function pauseGame() {
  if (!running) return;
  paused = !paused;
  setMsg(paused ? '⏸ Pause' : '');
}

function resetGame() {
  clearInterval(gameLoop);
  running = false; paused = false;
  initState(); draw();
  setMsg('Appuie sur Start pour jouer');
}

function tick() { if (!paused) { move(); draw(); } }

function move() {
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x<0||head.x>=GRID||head.y<0||head.y>=GRID) { gameOver(); return; }
  if (snake.some(s=>s.x===head.x&&s.y===head.y))       { gameOver(); return; }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) {
    score++; tokens++;
    localStorage.setItem('snakeTokens', tokens);
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('snakeHigh', highScore);
      updateLeaderboard();
    }
    if (score >= 10 && !nftUnlocked) {
      nftUnlocked = true;
      localStorage.setItem('snakeNFT','1');
      document.getElementById('nftBadge').classList.add('show');
      setMsg('🏆 NFT Reward débloqué !');
    }
    if (score % 5 === 0) {
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, Math.max(60, 130 - score*4));
    }
    spawnFood(); updateUI();
  } else { snake.pop(); }
}

async function gameOver() {
  clearInterval(gameLoop);
  running = false;
  console.log('Game Over — score final:', score);
  updateLeaderboard();
  setMsg('💀 Game Over ! Score : ' + score + ' | Best : ' + highScore);
  updateUI();
  // Envoyer score on-chain
  if (score > 0) await sendScoreOnChain(score);
}

// ══════════════════════════════════════════════
//  DRAW
// ══════════════════════════════════════════════
function draw() {
  ctx.clearRect(0,0,400,400);
  ctx.fillStyle='#0d0d1a'; ctx.fillRect(0,0,400,400);
  // grille
  ctx.strokeStyle='#1a1a2e'; ctx.lineWidth=0.5;
  for(let i=0;i<=GRID;i++){
    ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,400);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(400,i*CELL);ctx.stroke();
  }
  // nourriture
  ctx.fillStyle='#f59e0b'; ctx.shadowColor='#f59e0b'; ctx.shadowBlur=10;
  ctx.beginPath();ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/2-2,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // serpent
  snake.forEach((seg,i)=>{
    const r=1-i/snake.length;
    ctx.fillStyle=i===0?'#a78bfa':`rgba(109,40,217,${0.3+r*0.6})`;
    ctx.shadowColor=i===0?'#a78bfa':'transparent';
    ctx.shadowBlur=i===0?12:0;
    const p=i===0?1:2;
    ctx.beginPath();ctx.roundRect(seg.x*CELL+p,seg.y*CELL+p,CELL-p*2,CELL-p*2,3);ctx.fill();
  });
  ctx.shadowBlur=0;
  // HUD
  ctx.fillStyle='#a78bfa'; ctx.font='bold 12px Arial';
  ctx.fillText('Score: '+score,8,16);
  ctx.fillStyle='#f59e0b';
  ctx.fillText('Tokens: '+tokens,8,32);
  ctx.fillStyle='#38bdf8';
  ctx.fillText('On-chain: '+document.getElementById('dispChain').textContent,8,48);
}

// ══════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════
function setDir(x,y){
  if(x===1&&dir.x===-1)return; if(x===-1&&dir.x===1)return;
  if(y===1&&dir.y===-1)return; if(y===-1&&dir.y===1)return;
  dir={x,y};
}
document.addEventListener('keydown',e=>{
  const m={'ArrowUp':[0,-1],'z':[0,-1],'ArrowDown':[0,1],'s':[0,1],
           'ArrowLeft':[-1,0],'q':[-1,0],'ArrowRight':[1,0],'d':[1,0]};
  if(m[e.key]){setDir(...m[e.key]);e.preventDefault();}
  if(e.key===' '){(!running?startGame():pauseGame());e.preventDefault();}
});
function updateUI(){
  document.getElementById('dispScore').textContent=score;
  document.getElementById('dispHigh').textContent=highScore;
  document.getElementById('dispTokens').textContent=tokens;
  if(nftUnlocked)document.getElementById('nftBadge').classList.add('show');
}
function setMsg(m){document.getElementById('msg').textContent=m;}
function setChainMsg(m){document.getElementById('chainMsg').textContent=m;}
function txLog(m){
  const el=document.getElementById('txLog');
  el.textContent+='\n'+new Date().toLocaleTimeString()+' > '+m;
  el.scrollTop=el.scrollHeight;
}
function updateLeaderboard(){
  const addr=walletAddress?walletAddress.slice(0,6)+'...'+walletAddress.slice(-4):'Joueur';
  const e=leaderboard.find(x=>x.addr===addr);
  if(!e)leaderboard.push({addr,score:highScore});
  else if(highScore>e.score)e.score=highScore;
  leaderboard.sort((a,b)=>b.score-a.score);
  leaderboard=leaderboard.slice(0,5);
  localStorage.setItem('snakeLB',JSON.stringify(leaderboard));
  renderLeaderboard();
}
function renderLeaderboard(){
  const el=document.getElementById('leaderboard');
  if(!leaderboard.length){el.innerHTML='<div style="font-size:11px;color:#555;text-align:center">Joue pour apparaître ici</div>';return;}
  const medals=['🥇','🥈','🥉','4.','5.'];
  el.innerHTML=leaderboard.map((e,i)=>
    `<div class="lb-row"><span>${medals[i]}</span><span class="lb-addr">${e.addr}</span><span class="lb-score">${e.score}</span></div>`
  ).join('');
}

// ══════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════
initState(); draw(); renderLeaderboard();
setMsg('Connecte ton wallet puis appuie sur Start');
</script>
</body>
</html>
