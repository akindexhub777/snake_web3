<!DOCTYPE html>
<html>
<head>
  <title>Snake Web3 AI 🐍</title>
  <script type="importmap">
  {
    "imports": {
      "genlayer-js": "https://esm.sh/genlayer-js@latest",
      "genlayer-js/chains": "https://esm.sh/genlayer-js@latest/chains"
    }
  }
  </script>
  <style>
    body { text-align: center; background: #000; color: #0f0; font-family: 'Courier New', monospace; padding: 20px; }
    canvas { background: #111; border: 4px solid #0f0; box-shadow: 0 0 20px #0f0; }
   .ui { margin: 20px; padding: 15px; border: 1px solid #333; display: inline-block; border-radius: 10px; }
    button { background: #0f0; color: #000; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; border-radius: 5px; margin: 5px; }
    button:hover { background: #fff; }
  </style>
</head>
<body>
  <h1>🐍 SNAKE WEB3 PRO</h1>
  <div class="ui">
    <button id="connectBtn">1. CONNECTER WALLET</button>
    // ▶️ START
function startGame() {
  if (!walletAddress) {
    alert("Connect wallet first 🔗")
    return
  }
  init()
    <button id="saveBtn">2. SAUVEGARDER SCORE ON-CHAIN</button>
    <p>Score : <span id="score">0</span> | Statut : <span id="status">Prêt</span></p>
  </div>
  <br>
  <canvas id="game" width="400" height="400"></canvas>
  <script type="module">
    import { createClient } from 'genlayer-js';
    import { studionet } from 'genlayer-js/chains';

    // ⚠️ REMPLACE PAR TON ADRESSE (Celle de ton image : 0x47...464b)
    const CONTRACT_ADDR = "0x7b2dF88E33Bafa869934b3Da028eC5433eC8f101"; 
    const client = createClient({ chain: studionet, endpoint: "https://studio.genlayer.com/api/rpc" });

    let account = null;
    let score = 0;
    let gameActive = false;

    document.getElementById('connectBtn').onclick = async () => {
      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      account = accounts;
      document.getElementById('status').innerText = "Connecté!";
    };

    document.getElementById('saveBtn').onclick = async () => {
      if (!account) return alert("Connecte ton wallet!");
      document.getElementById('status').innerText = "⏳ Envoi à GenLayer...";
      try {
        const tx = await client.writeContract({
          address: CONTRACT_ADDR,
          functionName: "eat_food", // Correspond à ton code Studio
          args:,
          account: account
        });
        await client.waitForTransactionReceipt({ hash: tx });
        document.getElementById('status').innerText = "✅ Score enregistré!";
      } catch (e) {
        document.getElementById('status').innerText = "❌ Erreur";
      }
    };

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    let snake = [{x: 10, y: 10}];
    let food = {x: 5, y: 5};
    let dx = 0, dy = 0;

    document.addEventListener("keydown", (e) => {
      gameActive = true;
      if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -1; }
      if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = 1; }
      if (e.key === "ArrowLeft" && dx === 0) { dx = -1; dy = 0; }
      if (e.key === "ArrowRight" && dx === 0) { dx = 1; dy = 0; }
    });

    function draw() {
      if (gameActive) {
        let head = { x: snake.x + dx, y: snake.y + dy };
        snake.unshift(head);
        if (head.x === food.x && head.y === food.y) {
          score++;
          document.getElementById('score').innerText = score;
          food = {x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20)};
        } else { snake.pop(); }
      }
      ctx.fillStyle = "#111"; ctx.fillRect(0,0,400,400);
      ctx.fillStyle = "#0f0"; snake.forEach(s => ctx.fillRect(s.x*20, s.y*20, 18, 18));
      ctx.fillStyle = "#f00"; ctx.fillRect(food.x*20, food.y*20, 18, 18);
      setTimeout(draw, 150);
    }
    draw();
  </script>
</body>
</html>
